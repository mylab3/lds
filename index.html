<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricerca Codice Stazione</title>
    <style>
        :root {
            --primary: #1e1b4b;
            --text-muted: #64748b;
            --bg-body: #f1f5f9;
            --card-bg: #ffffff;
            --input-bg: #f8fafc;
            --border-color: #cbd5e1;
            --accent: #4f46e5;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            max-width: 580px;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            position: relative;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .header-title svg {
            color: var(--accent);
            width: 24px;
            height: 24px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 0;
            margin-bottom: 16px;
        }

        .counter-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
            background-color: #e0e7ff;
            padding: 4px 10px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .divider {
            height: 1px;
            background-color: #f1f5f9;
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group.flex-1 {
            flex: 1;
            position: relative;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            height: 42px;
            padding: 0 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            font-size: 0.95rem;
            color: #334155;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--accent);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        input[readonly] {
            text-align: center;
            letter-spacing: 0.1em;
            font-weight: 600;
            color: #475569;
            cursor: default;
        }

        .btn-copy {
            height: 42px;
            width: 42px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .btn-copy:hover {
            background-color: #e2e8f0;
            color: var(--primary);
        }

        .btn-copy:active {
            transform: scale(0.95);
        }

        #statusMsg {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #10b981;
            display: none;
            text-align: right;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-title">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5L12 21m0 0l-7.5-7.5M12 21V3" />
        </svg>
        <h1>Ricerca Codice Stazione</h1>
    </div>
    <p class="subtitle">Digita il nome e seleziona la stazione dalla lista per rivelarne il codice.</p>
    
    <div id="counter" class="counter-badge">Caricamento XML in corso...</div>

    <div class="divider"></div>

    <div class="form-row">
        <div class="field-group flex-1">
            <label for="stazioneInput">NOME STAZIONE</label>
            <input type="text" id="stazioneInput" list="stazioniList" placeholder="Es. Torino, Milano, Genova..." autocomplete="off">
            <datalist id="stazioniList"></datalist>
        </div>

        <div class="field-group flex-1">
            <label for="codiceInput">CODICE STAZIONE</label>
            <input type="text" id="codiceInput" placeholder="------" readonly>
        </div>

        <button class="btn-copy" onclick="copyCode()" title="Copia codice">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
        </button>
    </div>

    <div id="statusMsg">Codice copiato negli appunti!</div>
</div>

<script>
    const stazioniMap = new Map();

    fetch('stazioni2.xml')
        .then(response => {
            if (!response.ok) throw new Error("File stazioni2.xml non trovato");
            return response.text();
        })
        .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
        .then(xml => {
            parseXMLUniversal(xml);
        })
        .catch(err => {
            const counter = document.getElementById('counter');
            counter.innerText = "Errore: " + err.message;
            counter.style.backgroundColor = "#fecaca";
            counter.style.color = "#991b1b";
        });

    function parseXMLUniversal(xml) {
        const datalist = document.getElementById('stazioniList');
        
        // Trova tutti i nodi foglia o nodi che contengono informazioni
        let allElements = Array.from(xml.querySelectorAll('*'));
        
        // Selezioniamo solo i nodi che hanno figli di testo o attributi
        let stazioniTrovate = 0;

        allElements.forEach(node => {
            let nome = null;
            let codice = null;

            // 1. Estrazione da figli del nodo
            let children = Array.from(node.children);
            if (children.length > 0) {
                children.forEach(child => {
                    let tag = child.tagName.toLowerCase();
                    let text = child.textContent.trim();

                    if (tag.includes('nome') || tag.includes('stazione') || tag.includes('denominazione') || tag.includes('des')) {
                        nome = text;
                    }
                    if (tag.includes('cod') || tag.includes('id') || tag.includes('key')) {
                        codice = text;
                    }
                });
            }

            // 2. Se non trovati nei sotto-tag, cerca negli attributi del nodo stesso
            if (!nome || !codice) {
                Array.from(node.attributes).forEach(attr => {
                    let attrName = attr.name.toLowerCase();
                    let attrVal = attr.value.trim();

                    if (attrName.includes('nome') || attrName.includes('stazione') || attrName.includes('des')) {
                        nome = attrVal;
                    }
                    if (attrName.includes('cod') || attrName.includes('id')) {
                        codice = attrVal;
                    }
                });
            }

            // 3. Fallback: se il nodo ha 2 elementi e uno è testo e l'altro un numero/codice
            if (!nome && children.length === 2) {
                let txt1 = children[0].textContent.trim();
                let txt2 = children[1].textContent.trim();

                if (isNaN(txt1) && !isNaN(txt2)) { nome = txt1; codice = txt2; }
                else if (!isNaN(txt1) && isNaN(txt2)) { codice = txt1; nome = txt2; }
            }

            // Se abbiamo identificato sia un nome che un codice, salviamo
            if (nome && codice && !stazioniMap.has(nome.toLowerCase())) {
                stazioniMap.set(nome.toLowerCase(), codice);

                const option = document.createElement('option');
                option.value = nome;
                datalist.appendChild(option);
                stazioniTrovate++;
            }
        });

        document.getElementById('counter').innerText = `Record caricati: ${stazioniTrovate}`;
    }

    document.getElementById('stazioneInput').addEventListener('input', function(e) {
        const val = e.target.value.trim().toLowerCase();
        const codiceInput = document.getElementById('codiceInput');

        if (stazioniMap.has(val)) {
            codiceInput.value = stazioniMap.get(val);
        } else {
            codiceInput.value = '';
        }
    });

    function copyCode() {
        const codice = document.getElementById('codiceInput').value;
        if (!codice) return;

        navigator.clipboard.writeText(codice).then(() => {
            const msg = document.getElementById('statusMsg');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 2000);
        });
    }
</script>

</body>
</html>
